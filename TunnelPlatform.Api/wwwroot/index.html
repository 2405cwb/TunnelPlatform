<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>地铁隧道展示平台</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <div class="shell">
        <header class="topbar">
            <div class="brand">
                <p class="eyebrow">Tunnel Inspection Console</p>
                <h1>地铁隧道展示平台</h1>
            </div>
            <div class="top-actions">
                <select id="projectSelect" aria-label="选择工程实例"></select>
                <select id="themeSelect" aria-label="主题">
                    <option value="dark">深色主题</option>
                    <option value="light">白色主题</option>
                </select>
                <button id="refreshButton" type="button" title="刷新数据">刷新</button>
                <a class="ghost-link" href="/swagger" target="_blank">Swagger</a>
            </div>
        </header>

        <main class="workspace">
            <aside class="left-rail">
                <section class="panel entity-panel">
                    <div class="panel-heading">
                        <h2>站点区间</h2>
                        <span id="entityCount">0</span>
                    </div>
                    <div id="entityList" class="entity-list"></div>
                </section>

                <section class="panel disease-panel">
                    <div class="disease-toolbar">
                        <div>
                            <h2>病害列表</h2>
                            <p id="diseaseMeta">选择类型后自动刷新，双击查看高清图</p>
                        </div>
                        <select id="diseaseTypeFilter" aria-label="病害类型筛选"></select>
                    </div>
                    <div class="mileage-filters">
                        <input id="mileageStart" type="number" step="0.001" placeholder="起点里程">
                        <input id="mileageEnd" type="number" step="0.001" placeholder="终点里程">
                    </div>
                    <div class="table-wrap">
                        <table>
                            <thead>
                                <tr>
                                    <th>类型</th>
                                    <th>里程</th>
                                    <th>范围</th>
                                    <th>图像</th>
                                </tr>
                            </thead>
                            <tbody id="diseaseRows"></tbody>
                        </table>
                    </div>
                </section>
            </aside>

            <section class="center-stage">
                <section class="panel viewer-panel">
                    <div class="viewer-toolbar">
                        <div>
                            <h2 id="viewerTitle">二维连续浏览</h2>
                            <p id="viewerMeta">鼠标滚轮可切换图片</p>
                        </div>
                        <div class="view-tabs" role="tablist" aria-label="浏览模式">
                            <button id="imageViewTab" type="button" class="active" title="二维图像">二维图像</button>
                            <button id="pointCloudViewTab" type="button" title="点云断面">点云断面</button>
                        </div>
                        <div class="toolbar-controls">
                            <button id="prevImageButton" type="button" title="上一张">上一张</button>
                            <button id="nextImageButton" type="button" title="下一张">下一张</button>
                            <label class="switch">
                                <input id="ringToggle" type="checkbox" checked>
                                <span>环片</span>
                            </label>
                        </div>
                    </div>
                    <div class="stage-stack">
                        <div id="imageStage" class="image-stage stage-view active">
                            <img id="grayImage" alt="灰度图">
                            <div id="ringOverlay" class="ring-overlay"></div>
                            <div id="diseaseOverlay" class="disease-overlay"></div>
                            <div id="imageEmpty" class="empty-state">暂无灰度图</div>
                            <div id="ringNotice" class="ring-notice"></div>
                        </div>
                        <div id="pointCloudStage" class="pointcloud-stage stage-view">
                            <div class="pointcloud-viewport">
                                <div class="tunnel-section">
                                    <div class="section-ring"></div>
                                    <div class="section-ring inner"></div>
                                    <div id="cloudPoints" class="cloud-points"></div>
                                </div>
                                <div class="pointcloud-hud">
                                    <strong id="pointCloudFrameTitle">暂无点云帧</strong>
                                    <span id="pointCloudFrameMeta">未来可按帧号加载抽稀后的隧道断面点云</span>
                                </div>
                            </div>
                            <div class="pointcloud-controls">
                                <input id="pointCloudSlider" type="range" min="0" max="0" value="0">
                                <div id="pointCloudList" class="pointcloud-list"></div>
                            </div>
                        </div>
                    </div>
                    <div id="imageTimeline" class="timeline"></div>
                </section>
            </section>

            <aside class="right-rail">
                <section class="panel info-panel">
                    <div class="panel-heading">
                        <h2>工程信息</h2>
                        <span id="projectCount">0</span>
                    </div>
                    <div id="projectInfo" class="project-info"></div>
                    <div class="summary-strip" id="summaryStrip"></div>
                </section>

                <section class="panel stats-panel">
                    <div class="panel-heading">
                        <h2>病害统计</h2>
                        <div class="segmented">
                            <button id="entityStatsButton" type="button" class="active">当前区间</button>
                            <button id="projectStatsButton" type="button">当前工程</button>
                        </div>
                    </div>
                    <div class="donut-wrap">
                        <div id="diseaseDonut" class="donut">
                            <div>
                                <strong id="donutTotal">0</strong>
                                <span id="donutScope">当前区间</span>
                            </div>
                        </div>
                    </div>
                    <div id="diseaseStats" class="stat-bars"></div>
                </section>

                <section class="panel api-panel">
                    <div class="panel-heading">
                        <h2>API 状态</h2>
                        <span id="apiStatus">待刷新</span>
                    </div>
                    <div id="apiList" class="api-list"></div>
                </section>
            </aside>
        </main>
    </div>

    <dialog id="imageDialog">
        <div class="dialog-head">
            <div>
                <h2 id="dialogTitle">病害高清图</h2>
                <p id="dialogMeta"></p>
            </div>
            <button id="closeDialogButton" type="button" title="关闭">关闭</button>
        </div>
        <img id="dialogImage" alt="病害高清图">
    </dialog>

    <div id="toast" role="status"></div>
    <script src="/app.js?v=2026042703" defer></script>
</body>
</html>
